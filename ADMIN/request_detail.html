
<!DOCTYPE html>
<html>
<head>
<title>Theatre Request Details</title>
<link rel="stylesheet" href="admin_stylesheet/request_detail.css">
</head>

<body>

<header>
<h1>Theatre Registration Request</h1>

</header>

<div class="container">

<div class="details-card">

<h2 id="theatreName"></h2>

<p><strong>Owner:</strong> <span id="ownerName"></span></p>
<p><strong>Email:</strong> <span id="email"></span></p>
<p><strong>Type:</strong> <span id="type"></span></p>
<p><strong>AC:</strong> <span id="ac"></span></p>
<p><strong>Seats:</strong> <span id="capacity"></span></p>
<p><strong>Location:</strong> <span id="location"></span></p>

<div class="actions">
<button class="approve-btn" onclick="approveRequest()">Approve</button>
<button class="reject-btn" onclick="rejectRequest()">Reject</button>
</div>

</div>

</div>

<script src="admin_script/request_detail.js"></script>

</body>
</html>
