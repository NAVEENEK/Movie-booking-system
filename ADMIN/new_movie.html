<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add New Movie</title>

<link rel="stylesheet" href="admin_stylesheet/new_movie.css">

</head>

<body>

<header class="header">

<h2>Add New Movie</h2>

<a href="admin_home.html" class="back-btn">← Back</a>

</header>

<div class="container">

  <form class="movie-form" action="admin_backend/new_movie.php" method="post" enctype="multipart/form-data">

<div class="input-group">
<label>Movie Name</label>
<input type="text" name="title" placeholder="Enter movie name" required>
</div>

<div class="input-group">
<label>Banner Image</label>
<input type="file" name="poster" accept="image/*" required>
</div>

<div class="input-group">
<label>Rating</label>
<input type="text" name="rating">
</div>

<div class="input-group">
<label>Duration</label>
<input type="text" name="duration">
</div>

<div class="input-group">
<label>Language</label>
<select name="language">
<option>English</option>
<option>Malayalam</option>
<option>Hindi</option>
<option>Tamil</option>
<option>Telugu</option>
</select>
</div>

<div class="input-group">
<label>Genre</label>
<select name="genre">
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Thriller</option>
<option>Horror</option>
<option>Sci-Fi</option>
</select>
</div>

<div class="input-group">
<label>Release Date</label>
<input type="date" name="release_date">
</div>

<div class="input-group">
<label>Available Format</label>
<select name="format">
<option>2D</option>
<option>3D</option>
<option>IMAX</option>
<option>4DX</option> 
</select>
</div>

<div class="input-group">
<label>Description</label>
<textarea name="description" placeholder="Enter movie description"></textarea>
</div>

<button type="submit">Add Movie</button>

</form>


</div>

</body>

</html>
