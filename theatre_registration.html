<!DOCTYPE html>
<html lang="en">

<head>
  <title>Theatre Registration</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h3>Register Your Theatre</h3><br>
  <form action="/theatre_registration" method="post"> 
    <label for="name">Theatre Name:</label> 
    <input type="text" id="name" name="name" placeholder="Enter Theatre Name" required><br><br> 
    
    <label for="owner">Theatre Owner:</label> 
    <input type="text" id="owner" name="owner" placeholder="Enter Theatre Owner" required><br><br> 
    
    <label for="license">License Number:</label> 
    <input type="number" id="license" name="license" placeholder="Enter License Number" required><br><br> 
    
    <label for="address">Address:</label><br> 
    <textarea id="address" name="address" rows="4" cols="30" placeholder="Building no,Street, City, State, Pincode"
      required></textarea><br><br> 
      
      <label for="password">Password:</label> 
      <input type="password" id="password" name="password" required><br><br> 
      
      <button type="submit">Register</button> 
    
    </form>
</body>

</html>
