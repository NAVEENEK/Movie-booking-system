<!DOCTYPE html>
<html lang="en">

<head>
  <title>User Registration</title>
  <link rel="stylesheet" href="login_stylesheet/style.css">
</head>

<body>
   <div class="container">
     <h2>USER REGISTRATION</h2>
  <form action="login_backend/user_registration.php" method="post">
    <label for="name">Full Name:</label>
    <input type="text" placeholder="Enter your name" id="name" name="name" required><br>

    <label for="dob">Date of birth:</label>
    <input type="date" id="dob" name="dob" required><br>

    <label>Gender:</label>
    <div class="gender">
    <input type="radio"  name="gender" value="male" required>Male
    

    <input type="radio" name="gender" value="female" required>Female
    </div>
  


    <label for="email">Email:</label>
    <input type="email" placeholder="Enter your email" name="email" required><br>

    <label for="phone">Phone number:</label>
    <input type="text" placeholder="Enter your number" name="phone" required><br>    

    

    <label for="password">Password</label>
    <input type="password" placeholder="Enter your password" id="password" name="password"  required><br>

    <button type="submit">Register</button>


  </form>
</div>
</body>

</html>
