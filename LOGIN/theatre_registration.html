<!DOCTYPE html>
<html lang="en">
<head>
    <title>Theatre Registration</title>
    

    <!-- Link your existing CSS -->
    <link rel="stylesheet" href="login_stylesheet/style.css">
</head>

<body>

<h1>REGISTER YOUR THEATRE</h1>

<div class="container">
    <form action="theatre_registration.php" method="post">

        <label>Theatre Name:</label>
        <input type="text" name="name" placeholder="Enter Theatre Name" required>

        <label>Theatre Owner:</label>
        <input type="text" name="owner" placeholder="Enter Theatre Owner" required>

        <label>License Number:</label>
        <input type="text" name="license" placeholder="Enter License Number" required>

        <label>Address:</label>
        <textarea name="address" rows="4" placeholder="Building no, Street, City, State, Pincode" required></textarea>

        <!-- NEW FIELD -->
        <label>Theatre Type:</label>
        <select name="theatre_type" required>
            <option value="">Select Type</option>
            <option value="2D">2D</option>
            <option value="3D">3D</option>
            <option value="IMAX">IMAX</option>
            <option value="4DX">4DX</option>
        </select>

        <!-- NEW FIELD -->
        <label>AC Type:</label>
        <select name="ac_type" required>
            <option value="">Select AC Type</option>
            <option value="AC">AC</option>
            <option value="Non-AC">Non-AC</option>
        </select>

        <!-- NEW FIELD -->
        <label>Seat Capacity:</label>
        <input type="number" name="seats" placeholder="Enter total seats" min="1" required>

        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter your Password" required>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
