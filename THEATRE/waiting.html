<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waiting for Approval</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a; /* dark background */
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 350px;
        }

        h1 {
            color: #38bdf8; /* accent blue */
            margin-bottom: 20px;
        }

        p {
            color: #cbd5f5;
            margin-bottom: 30px;
        }

        .loader {
            border: 4px solid #334155;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .note {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Request Submitted</h1>
        <p>Your theatre registration is under review.</p>

        <div class="loader"></div>

        <p class="note">
            Please wait for admin approval.<br>
            You will be able to login once approved.
        </p>
    </div>

</body>
</html>
