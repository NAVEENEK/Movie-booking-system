<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Theatre Details</title>

<link rel="stylesheet" href="Theatre_stylesheet/theatre_details.css">

</head>

<body>

<div class="page">

<div class="card">

<h2>Theatre Details</h2>
<p class="subtitle">Enter information about your theatre</p>

<form action="theatre_next.html" method="POST">

<div class="input-group">
<label for="name">Theatre Name</label>
<input type="text" id="name" name="theatre_name" placeholder="Enter theatre name" required>
</div>

<div class="input-group">
<label for="type">Theatre Type</label>
<select id="type" name="theatre_type" required>
<option value="">Select Type</option>
<option value="2D">2D</option>
<option value="3D">3D</option>
<option value="IMAX">IMAX</option>
</select>
</div>

<div class="input-group">
<label for="ac">AC Type</label>
<select id="ac" name="ac_type" required>
<option value="">Select</option>
<option value="AC">AC</option>
<option value="Non AC">Non AC</option>
</select>
</div>

<div class="input-group">
<label for="capacity">Seat Capacity</label>
<input type="number" id="capacity" name="seat_capacity" placeholder="Total seats" required>
</div>

<div class="input-group">
<label for="location">Location</label>
<input type="text" id="location" name="location" placeholder="City / Area" required>
</div>

<button class="next-btn" type="submit">
Next →
</button>

</form>

</div>

</div>

</body>
</html>
