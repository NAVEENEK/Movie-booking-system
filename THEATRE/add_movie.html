<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add New Show</title>

<link rel="stylesheet" href="Theatre_stylesheet/add_movie.css">

</head>

<body>

<header class="header">

<h2>Add New Show</h2>

<a href="theatre_home.html" class="back-btn">← Back</a>

</header>

<div class="container">

<div class="form-section">

<h3>Show Details</h3>

<form>

<div class="input-group">

<label>Search Movie</label>

<input type="text" id="movieSearch" placeholder="Search movie name">

<select id="movieList">

<option value="">Select Movie</option>

<option value="Silent Echoes" data-img="https://picsum.photos/300/420?1">Silent Echoes</option>

<option value="Midnight Manor" data-img="https://picsum.photos/300/420?2">Midnight Manor</option>

<option value="Pixel Adventures" data-img="https://picsum.photos/300/420?3">Pixel Adventures</option>

<option value="Holiday Heist" data-img="https://picsum.photos/300/420?4">Holiday Heist</option>

</select>

</div>

<div class="input-group">

<label>Screen</label>

<select>
<option>Screen 1</option>
<option>Screen 2</option>
<option>Screen 3</option>
</select>

</div>

<div class="input-group">

<label>Format</label>

<select>
<option>2D</option>
<option>3D</option>
<option>IMAX</option>
</select>

</div>

<div class="input-group">

<label>Show Timing</label>

<input type="time">

</div>

<div class="input-group">

<label>Ticket Price (₹)</label>

<input type="number" placeholder="Enter ticket price">

</div>

<div class="input-group">

<label>Total Seats</label>

<input type="number" placeholder="Enter total seats">

</div>

<button type="submit" onclick="generatePreview()">Generate Show Banner</button>

</form>

</div>

<div class="preview-section">

<h3>Show Preview</h3>

<div class="show-card">

<div class="rating">7.2</div>

<img id="previewImage" src="https://picsum.photos/300/420" />

<h4 id="previewTitle">Movie Title</h4>

<p id="previewDetails">Format • Time</p>

</div>

</div>

</div>

<script>

const movieList = document.getElementById("movieList")
const previewImage = document.getElementById("previewImage")
const previewTitle = document.getElementById("previewTitle")
const previewDetails = document.getElementById("previewDetails")

movieList.addEventListener("change", function(){

const selected = movieList.options[movieList.selectedIndex]

previewTitle.innerText = selected.value

previewImage.src = selected.dataset.img

})

function generatePreview(){

const format = document.querySelectorAll("select")[1].value
const time = document.querySelector("input[type='time']").value

previewDetails.innerText = format + " • " + time

}

</script>

</body>

</html>
