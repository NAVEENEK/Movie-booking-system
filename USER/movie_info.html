<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Movie Details</title>
<link rel="stylesheet" href="user_stylesheet/movie_info.css">
</head>

<body>

<header class="navbar">
    <div class="logo">🎬 CineRed</div>
</header>

<div class="movie-container">

    <img id="moviePoster" class="movie-banner">

    <div class="movie-details">

        <h1 id="movieTitle"></h1>
        <p id="movieMeta" class="movie-meta"></p>
        <p id="movieDescription"></p>
        <div id="movieRating"></div>

        <button class="primary-btn" id="viewReviewBtn">
            View Reviews
        </button>

        <button class="primary-btn" id="addReviewBtn">
            Add Review
        </button>

    </div>

</div>

<div class="filter-section">
    <select id="districtSelect">
        <option value="">Select District</option>
        <option value="Ernakulam">Ernakulam</option>
    </select>

    <input type="date" id="dateSelect">
</div>

<h2>Theaters Nearby</h2>
<div id="theatreList"></div>

<script src="user_script/movie_info.js"></script>

<script>
document.getElementById("addReviewBtn").onclick = function () {

    const movie_id = new URLSearchParams(window.location.search).get("id");

    console.log("CLICK movie_id:", movie_id);

    if (!movie_id) {
        alert("Movie ID missing");
        return;
    }

    window.location.href = "/movie_booking/USER/add_review.html?id=" + movie_id;
};


document.getElementById("viewReviewBtn").onclick = function () {

    const movie_id = new URLSearchParams(window.location.search).get("id");

    if (!movie_id) {
        alert("Movie ID missing");
        return;
    }

    window.location.href = "/movie_booking/USER/movie_review.html?id=" + movie_id;
};
</script>

</body>
</html>
