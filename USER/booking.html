<!DOCTYPE html>
<html>
<head>
<title>Seat Booking</title>
<link rel="stylesheet" href="user_stylesheet/booking.css">
</head>

<body>

<header class="navbar">
<h2>Movie Booking</h2>
</header>

<div class="container">

<!-- MOVIE INFO -->

<div class="movie-card">

<img src="../images/movie.jpg" class="movie-poster">

<div class="movie-details">

<h2>Avengers Endgame</h2>

<p class="rating">⭐ 8.7 / 10</p>

<p>English • Action • 3h 1m</p>

<p>PVR Cinemas • 7:30 PM</p>

</div>

</div>


<!-- FORMAT SELECTION -->

<div class="format-section">

<button class="format-btn active" data-format="2D">2D</button>
<button class="format-btn" data-format="3D">3D</button>
<button class="format-btn" data-format="Standard">Standard</button>

</div>


<!-- SCREEN -->

<div class="screen">SCREEN</div>


<!-- SEATS -->

<div id="seat-container" class="seat-container"></div>


<!-- SUMMARY -->

<div class="summary">

<p>Seats Selected: <span id="seat-count">0</span></p>

<p>Total Price: ₹ <span id="total-price">0</span></p>

<button id="confirmBtn">Confirm Booking</button>

</div>

</div>

<script src="user_script/booking.js"></script>

</body>
</html>
